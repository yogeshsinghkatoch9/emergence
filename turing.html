<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Turing — Reaction Diffusion</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Inter:wght@300;400&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#060608;color:#fff;font-family:'Inter',sans-serif;overflow:hidden;height:100vh;width:100vw}
  canvas{display:block;position:absolute;top:0;left:0;cursor:crosshair}

  #intro{position:fixed;inset:0;z-index:100;background:#060608;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;transition:opacity 1.2s}
  #intro.hide{opacity:0;pointer-events:none}
  #intro h1{font-family:'Cormorant Garamond',serif;font-size:clamp(48px,8vw,80px);font-weight:300;letter-spacing:12px;text-transform:lowercase;color:rgba(255,255,255,.8);margin-bottom:12px}
  #intro p{font-size:13px;font-weight:300;color:rgba(255,255,255,.2);letter-spacing:3px;max-width:440px;line-height:1.8;margin-bottom:32px}
  #intro button{background:none;border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.5);font-family:'Cormorant Garamond',serif;font-size:18px;letter-spacing:6px;padding:14px 48px;border-radius:60px;cursor:pointer;transition:all .4s}
  #intro button:hover{border-color:rgba(255,255,255,.3);color:rgba(255,255,255,.8);box-shadow:0 0 40px rgba(255,255,255,.05)}

  .info{position:fixed;top:20px;left:20px;z-index:10;display:none}
  .info-title{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:300;color:rgba(255,255,255,.08);letter-spacing:6px}
  .info-sub{font-size:10px;color:rgba(255,255,255,.08);letter-spacing:2px;margin-top:4px}
  .info-gen{font-size:9px;color:rgba(255,255,255,.06);letter-spacing:1px;margin-top:2px;font-variant-numeric:tabular-nums}

  #controls{position:fixed;top:20px;right:20px;z-index:10;display:none;flex-direction:column;gap:5px;align-items:flex-end}
  .ctrl-row{display:flex;align-items:center;gap:8px}
  .ctrl-label{font-size:9px;color:rgba(255,255,255,.15);letter-spacing:2px;text-transform:uppercase;min-width:50px;text-align:right}
  .ctrl-val{font-size:9px;color:rgba(255,255,255,.1);letter-spacing:1px;min-width:36px;text-align:left;font-variant-numeric:tabular-nums}
  .ctrl-slider{-webkit-appearance:none;appearance:none;width:90px;height:2px;background:rgba(255,255,255,.06);border-radius:2px;outline:none}
  .ctrl-slider::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.2);cursor:pointer;transition:background .2s}
  .ctrl-slider::-webkit-slider-thumb:hover{background:rgba(255,255,255,.4)}
  .ctrl-btn{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);color:rgba(255,255,255,.2);font-size:9px;letter-spacing:2px;padding:5px 12px;border-radius:14px;cursor:pointer;transition:all .3s;text-transform:uppercase}
  .ctrl-btn:hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.4)}

  .preset-bar{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:10;display:none;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center;max-width:90vw}
  .preset-btn{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);color:rgba(255,255,255,.2);font-family:'Inter',sans-serif;font-size:10px;letter-spacing:2px;padding:8px 16px;border-radius:20px;cursor:pointer;transition:all .3s;text-transform:lowercase}
  .preset-btn:hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.4)}
  .preset-btn.active{border-color:rgba(255,200,100,.2);color:rgba(255,200,100,.4);background:rgba(255,200,100,.03)}

  .palette-bar{position:fixed;bottom:64px;left:50%;transform:translateX(-50%);z-index:10;display:none;gap:6px;align-items:center}
  .pal-btn{width:28px;height:28px;border-radius:50%;border:1px solid rgba(255,255,255,.06);cursor:pointer;transition:all .3s;overflow:hidden}
  .pal-btn:hover{border-color:rgba(255,255,255,.2);transform:scale(1.15)}
  .pal-btn.active{border-color:rgba(255,255,255,.3);box-shadow:0 0 12px rgba(255,255,255,.1)}
</style>
</head>
<body>

<div id="intro">
  <h1>turing</h1>
  <p>Two chemicals react and diffuse.<br>From noise, nature paints itself —<br>spots, stripes, labyrinths, spirals.</p>
  <button onclick="start()">enter</button>
</div>

<canvas id="canvas"></canvas>

<div class="info" id="info">
  <div class="info-title">turing</div>
  <div class="info-sub">click to seed · scroll to resize brush</div>
  <div class="info-gen" id="genCounter">generation 0</div>
</div>

<div id="controls">
  <div class="ctrl-row">
    <span class="ctrl-label">feed</span>
    <input class="ctrl-slider" type="range" min="0" max="1000" value="550" id="feedSlider">
    <span class="ctrl-val" id="feedVal">0.0550</span>
  </div>
  <div class="ctrl-row">
    <span class="ctrl-label">kill</span>
    <input class="ctrl-slider" type="range" min="0" max="1000" value="620" id="killSlider">
    <span class="ctrl-val" id="killVal">0.0620</span>
  </div>
  <div class="ctrl-row">
    <span class="ctrl-label">Da</span>
    <input class="ctrl-slider" type="range" min="50" max="150" value="100" id="daSlider">
    <span class="ctrl-val" id="daVal">1.00</span>
  </div>
  <div class="ctrl-row">
    <span class="ctrl-label">Db</span>
    <input class="ctrl-slider" type="range" min="20" max="80" value="50" id="dbSlider">
    <span class="ctrl-val" id="dbVal">0.50</span>
  </div>
  <div class="ctrl-row">
    <span class="ctrl-label">speed</span>
    <input class="ctrl-slider" type="range" min="1" max="20" value="8" id="speedSlider">
    <span class="ctrl-val" id="speedVal">8</span>
  </div>
  <div class="ctrl-row">
    <span class="ctrl-label">brush</span>
    <input class="ctrl-slider" type="range" min="2" max="40" value="8" id="brushSlider">
    <span class="ctrl-val" id="brushVal">8</span>
  </div>
  <div class="ctrl-row" style="margin-top:4px;gap:6px">
    <button class="ctrl-btn" onclick="resetSim()">reset</button>
    <button class="ctrl-btn" onclick="togglePause()">pause</button>
    <button class="ctrl-btn" onclick="saveImage()">save</button>
  </div>
</div>

<div class="palette-bar" id="paletteBar"></div>
<div class="preset-bar" id="presetBar"></div>

<script>
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');

// Simulation grid — lower resolution for performance
const SCALE=3;
let W,H,GW,GH;
let a,b,a2,b2; // chemical concentrations (double-buffered)
let generation=0;
let paused=false;
let running=false;
let brushRadius=8;
let mouseDown=false,mx=0,my=0;

// Parameters (Gray-Scott model)
let feed=0.055;
let kill=0.062;
let Da=1.0;
let Db=0.5;
let stepsPerFrame=8;

// Presets — carefully tuned feed/kill pairs
const PRESETS={
  'spots':       {f:0.035, k:0.065, Da:1.0, Db:0.5, desc:'mitotic spots'},
  'stripes':     {f:0.060, k:0.062, Da:1.0, Db:0.5, desc:'zebra stripes'},
  'labyrinth':   {f:0.042, k:0.063, Da:1.0, Db:0.5, desc:'coral maze'},
  'spirals':     {f:0.014, k:0.045, Da:1.0, Db:0.5, desc:'rotating spirals'},
  'worms':       {f:0.078, k:0.061, Da:1.0, Db:0.5, desc:'soliton worms'},
  'bubbles':     {f:0.020, k:0.055, Da:1.0, Db:0.5, desc:'negative bubbles'},
  'coral':       {f:0.055, k:0.063, Da:1.0, Db:0.5, desc:'branching coral'},
  'fingerprint': {f:0.045, k:0.065, Da:1.0, Db:0.5, desc:'whorl ridges'},
  'cells':       {f:0.025, k:0.060, Da:1.0, Db:0.5, desc:'cell division'},
  'chaos':       {f:0.026, k:0.051, Da:1.0, Db:0.5, desc:'unstable chaos'},
};

// Color palettes
const PALETTES={
  'bioluminescent':{
    name:'bioluminescent',
    colors:[[6,6,8],[0,20,40],[0,80,120],[0,180,200],[140,255,220],[255,255,255]],
    bg:'#001428'
  },
  'thermal':{
    name:'thermal',
    colors:[[10,0,20],[40,0,80],[160,0,80],[255,80,0],[255,200,0],[255,255,220]],
    bg:'#0a0014'
  },
  'bone':{
    name:'bone',
    colors:[[20,15,12],[50,40,35],[100,85,70],[160,145,125],[210,200,185],[245,240,230]],
    bg:'#140f0c'
  },
  'ink':{
    name:'ink',
    colors:[[240,235,225],[200,190,175],[120,110,100],[60,55,50],[25,22,20],[8,6,6]],
    bg:'#f0ebe1'
  },
  'abyss':{
    name:'abyss',
    colors:[[2,2,8],[10,5,40],[30,10,80],[80,20,140],[160,60,200],[220,180,255]],
    bg:'#020208'
  },
  'ember':{
    name:'ember',
    colors:[[8,4,2],[30,8,4],[80,15,5],[180,40,10],[255,120,20],[255,220,140]],
    bg:'#080402'
  },
  'moss':{
    name:'moss',
    colors:[[5,10,5],[15,30,10],[30,60,20],[60,120,40],[120,180,80],[200,240,160]],
    bg:'#050a05'
  },
  'ocean':{
    name:'ocean',
    colors:[[2,5,15],[5,15,45],[10,40,90],[30,90,150],[80,160,200],[180,230,240]],
    bg:'#02050f'
  },
};

let currentPalette='bioluminescent';
let currentPreset='coral';
let lut=new Uint8Array(256*3); // lookup table for fast coloring

function buildLUT(){
  const pal=PALETTES[currentPalette].colors;
  const n=pal.length-1;
  for(let i=0;i<256;i++){
    const t=i/255*n;
    const idx=Math.min(Math.floor(t),n-1);
    const frac=t-idx;
    const c0=pal[idx],c1=pal[idx+1];
    lut[i*3]=c0[0]+(c1[0]-c0[0])*frac;
    lut[i*3+1]=c0[1]+(c1[1]-c0[1])*frac;
    lut[i*3+2]=c0[2]+(c1[2]-c0[2])*frac;
  }
}

function resize(){
  W=innerWidth;H=innerHeight;
  canvas.width=W;canvas.height=H;
  GW=Math.floor(W/SCALE);
  GH=Math.floor(H/SCALE);
  initArrays();
}

function initArrays(){
  const sz=GW*GH;
  a=new Float32Array(sz);
  b=new Float32Array(sz);
  a2=new Float32Array(sz);
  b2=new Float32Array(sz);
  // Fill A=1, B=0
  a.fill(1);b.fill(0);
  a2.fill(1);b2.fill(0);
  generation=0;
}

function seedRandom(){
  // Scatter random B seeds
  const count=12+Math.floor(Math.random()*8);
  for(let s=0;s<count;s++){
    const cx=Math.floor(Math.random()*GW);
    const cy=Math.floor(Math.random()*GH);
    const r=Math.floor(Math.random()*8)+4;
    seedAt(cx,cy,r);
  }
}

function seedAt(cx,cy,r){
  for(let dy=-r;dy<=r;dy++){
    for(let dx=-r;dx<=r;dx++){
      if(dx*dx+dy*dy>r*r)continue;
      const x=(cx+dx+GW)%GW;
      const y=(cy+dy+GH)%GH;
      const id=x+y*GW;
      b[id]=1;
      // slight noise in A
      a[id]=Math.max(0,a[id]-.1+Math.random()*.2);
    }
  }
}

function seedCenter(){
  const cx=Math.floor(GW/2),cy=Math.floor(GH/2);
  seedAt(cx,cy,12);
  // Also seed a few random spots for variety
  for(let i=0;i<5;i++){
    const sx=cx+Math.floor((Math.random()-.5)*GW*.4);
    const sy=cy+Math.floor((Math.random()-.5)*GH*.4);
    seedAt(sx,sy,Math.floor(Math.random()*6)+3);
  }
}

// Gray-Scott reaction-diffusion step
function step(){
  const w=GW,h=GH;
  const dt=1.0;

  for(let y=0;y<h;y++){
    const ym=(y-1+h)%h,yp=(y+1)%h;
    for(let x=0;x<w;x++){
      const xm=(x-1+w)%w,xp=(x+1)%w;
      const id=x+y*w;

      const aVal=a[id];
      const bVal=b[id];

      // Laplacian (5-point stencil)
      const lapA=a[xm+y*w]+a[xp+y*w]+a[x+ym*w]+a[x+yp*w]-4*aVal;
      const lapB=b[xm+y*w]+b[xp+y*w]+b[x+ym*w]+b[x+yp*w]-4*bVal;

      const abb=aVal*bVal*bVal;

      a2[id]=aVal+(Da*lapA-abb+feed*(1-aVal))*dt;
      b2[id]=bVal+(Db*lapB+abb-(kill+feed)*bVal)*dt;

      // Clamp
      if(a2[id]<0)a2[id]=0;if(a2[id]>1)a2[id]=1;
      if(b2[id]<0)b2[id]=0;if(b2[id]>1)b2[id]=1;
    }
  }

  // Swap
  [a,a2]=[a2,a];
  [b,b2]=[b2,b];
  generation++;
}

// Render — offscreen canvas to avoid self-draw artifacts
let offCanvas,offCtx,imgData;
function ensureOffscreen(){
  if(!offCanvas||offCanvas.width!==GW||offCanvas.height!==GH){
    offCanvas=document.createElement('canvas');
    offCanvas.width=GW;offCanvas.height=GH;
    offCtx=offCanvas.getContext('2d');
    imgData=offCtx.createImageData(GW,GH);
  }
}
function render(){
  ensureOffscreen();
  const data=imgData.data;
  const w=GW,h=GH;

  for(let y=0;y<h;y++){
    for(let x=0;x<w;x++){
      const id=x+y*w;
      const px=id*4;

      const bVal=b[id];
      const aVal=a[id];

      let val=bVal*1.4-aVal*.05+.05;
      val=Math.max(0,Math.min(1,val));
      const ci=Math.floor(val*255);

      data[px]=lut[ci*3];
      data[px+1]=lut[ci*3+1];
      data[px+2]=lut[ci*3+2];
      data[px+3]=255;
    }
  }

  offCtx.putImageData(imgData,0,0);
  ctx.imageSmoothingEnabled=true;
  ctx.imageSmoothingQuality='high';
  ctx.drawImage(offCanvas,0,0,GW,GH,0,0,W,H);
}

// Input
canvas.addEventListener('mousedown',e=>{mouseDown=true;mx=e.clientX;my=e.clientY;paint(mx,my)});
canvas.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;if(mouseDown)paint(mx,my)});
canvas.addEventListener('mouseup',()=>{mouseDown=false});
canvas.addEventListener('mouseleave',()=>{mouseDown=false});
canvas.addEventListener('touchstart',e=>{e.preventDefault();mouseDown=true;const t=e.touches[0];mx=t.clientX;my=t.clientY;paint(mx,my)},{passive:false});
canvas.addEventListener('touchmove',e=>{e.preventDefault();const t=e.touches[0];mx=t.clientX;my=t.clientY;paint(mx,my)},{passive:false});
canvas.addEventListener('touchend',()=>{mouseDown=false});

addEventListener('wheel',e=>{
  brushRadius=Math.max(2,Math.min(40,brushRadius-e.deltaY*.02));
  document.getElementById('brushSlider').value=brushRadius;
  document.getElementById('brushVal').textContent=Math.round(brushRadius);
},{passive:true});

function paint(sx,sy){
  const cx=Math.floor(sx/SCALE);
  const cy=Math.floor(sy/SCALE);
  const r=Math.floor(brushRadius);
  for(let dy=-r;dy<=r;dy++){
    for(let dx=-r;dx<=r;dx++){
      if(dx*dx+dy*dy>r*r)continue;
      const x=(cx+dx+GW)%GW;
      const y=(cy+dy+GH)%GH;
      const id=x+y*GW;
      const dist=Math.sqrt(dx*dx+dy*dy)/r;
      const w=Math.exp(-dist*dist*2);
      b[id]=Math.min(1,b[id]+w*.8);
    }
  }
}

// Sliders
document.getElementById('feedSlider').addEventListener('input',e=>{
  feed=e.target.value/10000;
  document.getElementById('feedVal').textContent=feed.toFixed(4);
});
document.getElementById('killSlider').addEventListener('input',e=>{
  kill=e.target.value/10000;
  document.getElementById('killVal').textContent=kill.toFixed(4);
});
document.getElementById('daSlider').addEventListener('input',e=>{
  Da=e.target.value/100;
  document.getElementById('daVal').textContent=Da.toFixed(2);
});
document.getElementById('dbSlider').addEventListener('input',e=>{
  Db=e.target.value/100;
  document.getElementById('dbVal').textContent=Db.toFixed(2);
});
document.getElementById('speedSlider').addEventListener('input',e=>{
  stepsPerFrame=parseInt(e.target.value);
  document.getElementById('speedVal').textContent=stepsPerFrame;
});
document.getElementById('brushSlider').addEventListener('input',e=>{
  brushRadius=parseFloat(e.target.value);
  document.getElementById('brushVal').textContent=Math.round(brushRadius);
});

// Presets
function loadPreset(name){
  const p=PRESETS[name];if(!p)return;
  currentPreset=name;
  feed=p.f;kill=p.k;Da=p.Da;Db=p.Db;

  // Update sliders
  document.getElementById('feedSlider').value=Math.round(feed*10000);
  document.getElementById('killSlider').value=Math.round(kill*10000);
  document.getElementById('daSlider').value=Math.round(Da*100);
  document.getElementById('dbSlider').value=Math.round(Db*100);
  document.getElementById('feedVal').textContent=feed.toFixed(4);
  document.getElementById('killVal').textContent=kill.toFixed(4);
  document.getElementById('daVal').textContent=Da.toFixed(2);
  document.getElementById('dbVal').textContent=Db.toFixed(2);

  document.querySelectorAll('.preset-btn').forEach(b=>b.classList.remove('active'));
  const el=document.querySelector(`.preset-btn[data-preset="${name}"]`);
  if(el)el.classList.add('active');

  // Update info
  document.querySelector('.info-sub').textContent=p.desc+' · click to seed · scroll brush';
}

function applyPresetAndReset(name){
  loadPreset(name);
  resetSim();
}

// Build preset buttons
const presetBar=document.getElementById('presetBar');
Object.keys(PRESETS).forEach(name=>{
  const btn=document.createElement('div');
  btn.className='preset-btn'+(name===currentPreset?' active':'');
  btn.textContent=name;
  btn.dataset.preset=name;
  btn.onclick=()=>applyPresetAndReset(name);
  presetBar.appendChild(btn);
});

// Build palette buttons
const palBar=document.getElementById('paletteBar');
Object.keys(PALETTES).forEach(name=>{
  const pal=PALETTES[name];
  const btn=document.createElement('div');
  btn.className='pal-btn'+(name===currentPalette?' active':'');
  // Create gradient background
  const colors=pal.colors;
  const stops=colors.map((c,i)=>`rgb(${c[0]},${c[1]},${c[2]}) ${Math.round(i/(colors.length-1)*100)}%`).join(',');
  btn.style.background=`linear-gradient(135deg,${stops})`;
  btn.title=name;
  btn.onclick=()=>{
    currentPalette=name;
    buildLUT();
    document.querySelectorAll('.pal-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
  };
  palBar.appendChild(btn);
});

function resetSim(){
  initArrays();
  seedCenter();
  seedRandom();
}

function togglePause(){
  paused=!paused;
}

function saveImage(){
  // Render at full res
  render();
  const link=document.createElement('a');
  link.download=`turing-${currentPreset}-${generation}.png`;
  link.href=canvas.toDataURL('image/png');
  link.click();
}

// Keyboard
addEventListener('keydown',e=>{
  if(e.key===' '){e.preventDefault();togglePause()}
  if(e.key==='r')resetSim();
  if(e.key==='s'&&!e.metaKey&&!e.ctrlKey)saveImage();
  // Number keys for presets
  const presetNames=Object.keys(PRESETS);
  const num=parseInt(e.key);
  if(num>=1&&num<=presetNames.length){
    applyPresetAndReset(presetNames[num-1]);
  }
});

// Main loop
function tick(){
  if(!running){requestAnimationFrame(tick);return}
  if(!paused){
    for(let i=0;i<stepsPerFrame;i++)step();
    document.getElementById('genCounter').textContent='generation '+generation;
  }
  render();
  requestAnimationFrame(tick);
}

function start(){
  document.getElementById('intro').classList.add('hide');
  document.getElementById('info').style.display='block';
  document.getElementById('controls').style.display='flex';
  document.getElementById('presetBar').style.display='flex';
  document.getElementById('paletteBar').style.display='flex';
  running=true;
  loadPreset('coral');
  seedCenter();
  seedRandom();
}

addEventListener('resize',()=>{
  // Preserve state through resize is complex; just reset
  resize();
  if(running){seedCenter();seedRandom()}
});

resize();
buildLUT();
requestAnimationFrame(tick);
</script>
</body>
</html>
