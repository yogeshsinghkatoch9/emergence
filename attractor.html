<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attractor — Strange Attractor Explorer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    color: #e0e0e0;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    user-select: none;
  }

  canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100vw;
    height: 100vh;
    z-index: 0;
  }

  /* --- Control Panel --- */
  .panel {
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 100;
    width: 320px;
    background: rgba(10, 10, 20, 0.75);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 16px;
    padding: 24px;
    transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.4s ease;
  }

  .panel.collapsed {
    transform: translateX(-340px);
    opacity: 0;
    pointer-events: none;
  }

  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .panel-title {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.5);
  }

  .toggle-btn {
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 99;
    width: 44px;
    height: 44px;
    background: rgba(10, 10, 20, 0.75);
    backdrop-filter: blur(24px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 12px;
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.3s, transform 0.3s;
    opacity: 0;
    pointer-events: none;
  }

  .toggle-btn.visible {
    opacity: 1;
    pointer-events: all;
  }

  /* --- Attractor Selector --- */
  .attractor-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 20px;
  }

  .attractor-btn {
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.06);
    border-radius: 10px;
    padding: 10px 8px;
    color: rgba(255, 255, 255, 0.6);
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }

  .attractor-btn:hover {
    background: rgba(255, 255, 255, 0.08);
    color: #fff;
  }

  .attractor-btn.active {
    background: rgba(99, 102, 241, 0.2);
    border-color: rgba(99, 102, 241, 0.4);
    color: #a5b4fc;
  }

  /* --- Sliders --- */
  .param-group {
    margin-bottom: 16px;
  }

  .param-label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }

  .param-name {
    font-size: 11px;
    font-weight: 500;
    color: rgba(255, 255, 255, 0.4);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .param-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: rgba(99, 102, 241, 0.8);
  }

  input[type="range"] {
    -webkit-appearance: none;
    width: 100%;
    height: 4px;
    background: rgba(255, 255, 255, 0.06);
    border-radius: 2px;
    outline: none;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    background: #6366f1;
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 0 10px rgba(99, 102, 241, 0.4);
  }

  /* --- Color Palette --- */
  .palette-row {
    display: flex;
    gap: 6px;
    margin-bottom: 20px;
  }

  .palette-swatch {
    flex: 1;
    height: 28px;
    border-radius: 8px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: all 0.2s;
  }

  .palette-swatch:hover { transform: scale(1.1); }
  .palette-swatch.active { border-color: #fff; box-shadow: 0 0 12px rgba(255,255,255,0.3); }

  /* --- Action Buttons --- */
  .actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .action-btn {
    flex: 1;
    min-width: 60px;
    padding: 8px 12px;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.06);
    border-radius: 8px;
    color: rgba(255, 255, 255, 0.6);
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }

  .action-btn:hover {
    background: rgba(255, 255, 255, 0.08);
    color: #fff;
  }

  /* --- Info Badge --- */
  .info-badge {
    position: fixed;
    bottom: 20px;
    left: 20px;
    z-index: 100;
    background: rgba(10, 10, 20, 0.6);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(255, 255, 255, 0.06);
    border-radius: 10px;
    padding: 10px 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: rgba(255, 255, 255, 0.35);
    display: flex;
    gap: 16px;
  }

  .info-badge span { color: rgba(99, 102, 241, 0.6); }

  /* --- Title --- */
  .title-block {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 100;
    text-align: right;
  }

  .title-main {
    font-size: 14px;
    font-weight: 300;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.15);
  }

  .title-sub {
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 3px;
    color: rgba(255, 255, 255, 0.08);
    margin-top: 4px;
  }

  /* --- Separator --- */
  .sep {
    height: 1px;
    background: rgba(255, 255, 255, 0.06);
    margin: 16px 0;
  }

  .section-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.25);
    margin-bottom: 10px;
  }

  /* --- Equation Display --- */
  .equation {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: rgba(255, 255, 255, 0.2);
    line-height: 1.6;
    padding: 10px;
    background: rgba(0,0,0,0.3);
    border-radius: 8px;
    margin-bottom: 16px;
    white-space: pre;
  }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<!-- Toggle Button (visible when panel collapsed) -->
<button class="toggle-btn" id="toggleBtn" onclick="togglePanel()">&#9776;</button>

<!-- Control Panel -->
<div class="panel" id="panel">
  <div class="panel-header">
    <div class="panel-title">Controls</div>
    <button style="background:none;border:none;color:rgba(255,255,255,0.3);cursor:pointer;font-size:18px;" onclick="togglePanel()">&times;</button>
  </div>

  <!-- Attractor Type -->
  <div class="section-label">Attractor</div>
  <div class="attractor-grid" id="attractorGrid"></div>

  <!-- Equation -->
  <div class="equation" id="equation"></div>

  <!-- Parameters -->
  <div class="section-label">Parameters</div>
  <div id="paramSliders"></div>

  <div class="sep"></div>

  <!-- Visual -->
  <div class="section-label">Visual</div>

  <div class="param-group">
    <div class="param-label">
      <div class="param-name">Trail Length</div>
      <div class="param-value" id="trailVal">50</div>
    </div>
    <input type="range" min="5" max="200" value="50" id="trailSlider">
  </div>

  <div class="param-group">
    <div class="param-label">
      <div class="param-name">Speed</div>
      <div class="param-value" id="speedVal">1.0</div>
    </div>
    <input type="range" min="1" max="50" value="10" id="speedSlider">
  </div>

  <div class="param-group">
    <div class="param-label">
      <div class="param-name">Point Size</div>
      <div class="param-value" id="sizeVal">1.5</div>
    </div>
    <input type="range" min="5" max="40" value="15" id="sizeSlider">
  </div>

  <div class="sep"></div>

  <!-- Palette -->
  <div class="section-label">Palette</div>
  <div class="palette-row" id="paletteRow"></div>

  <div class="sep"></div>

  <!-- Actions -->
  <div class="actions">
    <button class="action-btn" onclick="resetView()">Reset</button>
    <button class="action-btn" onclick="clearCanvas()">Clear</button>
    <button class="action-btn" onclick="saveImage()">Save PNG</button>
    <button class="action-btn" onclick="toggleRotation()">Rotate</button>
  </div>
</div>

<!-- Title -->
<div class="title-block">
  <div class="title-main">Attractor</div>
  <div class="title-sub">Strange Attractor Explorer</div>
</div>

<!-- Info Badge -->
<div class="info-badge">
  <div>Points: <span id="pointCount">0</span></div>
  <div>FPS: <span id="fpsCount">0</span></div>
  <div id="attractorName">Lorenz</div>
</div>

<script>
// ============================================================
//  ATTRACTOR DEFINITIONS
// ============================================================
const ATTRACTORS = {
  lorenz: {
    name: 'Lorenz',
    params: { sigma: { val: 10, min: 0, max: 30, step: 0.1 }, rho: { val: 28, min: 0, max: 50, step: 0.1 }, beta: { val: 2.667, min: 0, max: 10, step: 0.01 } },
    dt: 0.005,
    scale: 12,
    eq: `dx/dt = σ(y - x)\ndy/dt = x(ρ - z) - y\ndz/dt = xy - βz`,
    step(x, y, z, p, dt) {
      const dx = p.sigma * (y - x);
      const dy = x * (p.rho - z) - y;
      const dz = x * y - p.beta * z;
      return [x + dx*dt, y + dy*dt, z + dz*dt];
    },
    init: () => [0.1, 0, 0]
  },
  aizawa: {
    name: 'Aizawa',
    params: { a: { val: 0.95, min: 0, max: 2, step: 0.01 }, b: { val: 0.7, min: 0, max: 2, step: 0.01 }, c: { val: 0.6, min: 0, max: 2, step: 0.01 }, d: { val: 3.5, min: 0, max: 6, step: 0.01 }, e: { val: 0.25, min: 0, max: 1, step: 0.01 }, f: { val: 0.1, min: 0, max: 1, step: 0.01 } },
    dt: 0.005,
    scale: 180,
    eq: `dx/dt = (z-b)x - dy\ndy/dt = dx + (z-b)y\ndz/dt = c + az - z³/3\n       - (x²+y²)(1+ez) + fzx³`,
    step(x, y, z, p, dt) {
      const dx = (z - p.b)*x - p.d*y;
      const dy = p.d*x + (z - p.b)*y;
      const dz = p.c + p.a*z - (z*z*z)/3 - (x*x + y*y)*(1 + p.e*z) + p.f*z*x*x*x;
      return [x + dx*dt, y + dy*dt, z + dz*dt];
    },
    init: () => [0.1, 0, 0]
  },
  thomas: {
    name: 'Thomas',
    params: { b: { val: 0.208186, min: 0, max: 1, step: 0.001 } },
    dt: 0.04,
    scale: 80,
    eq: `dx/dt = sin(y) - bx\ndy/dt = sin(z) - by\ndz/dt = sin(x) - bz`,
    step(x, y, z, p, dt) {
      const dx = Math.sin(y) - p.b*x;
      const dy = Math.sin(z) - p.b*y;
      const dz = Math.sin(x) - p.b*z;
      return [x + dx*dt, y + dy*dt, z + dz*dt];
    },
    init: () => [1.1, 1.1, -0.01]
  },
  halvorsen: {
    name: 'Halvorsen',
    params: { a: { val: 1.89, min: 0, max: 4, step: 0.01 } },
    dt: 0.004,
    scale: 18,
    eq: `dx/dt = -ax - 4y - 4z - y²\ndy/dt = -ay - 4z - 4x - z²\ndz/dt = -az - 4x - 4y - x²`,
    step(x, y, z, p, dt) {
      const dx = -p.a*x - 4*y - 4*z - y*y;
      const dy = -p.a*y - 4*z - 4*x - z*z;
      const dz = -p.a*z - 4*x - 4*y - x*x;
      return [x + dx*dt, y + dy*dt, z + dz*dt];
    },
    init: () => [-1.48, -1.51, 2.04]
  },
  chen: {
    name: 'Chen',
    params: { a: { val: 5, min: 0, max: 50, step: 0.1 }, b: { val: -10, min: -30, max: 0, step: 0.1 }, c: { val: -0.38, min: -2, max: 0, step: 0.01 } },
    dt: 0.002,
    scale: 12,
    eq: `dx/dt = a*x - y*z\ndy/dt = b*y + x*z\ndz/dt = c*z + x*y/3`,
    step(x, y, z, p, dt) {
      const dx = p.a*x - y*z;
      const dy = p.b*y + x*z;
      const dz = p.c*z + x*y/3;
      return [x + dx*dt, y + dy*dt, z + dz*dt];
    },
    init: () => [-0.1, 0.5, -0.6]
  },
  dadras: {
    name: 'Dadras',
    params: { p: { val: 3, min: 0, max: 10, step: 0.1 }, q: { val: 2.7, min: 0, max: 10, step: 0.1 }, r: { val: 1.7, min: 0, max: 5, step: 0.1 }, s: { val: 2, min: 0, max: 5, step: 0.1 }, e: { val: 9, min: 0, max: 15, step: 0.1 } },
    dt: 0.004,
    scale: 10,
    eq: `dx/dt = y - px + qyz\ndy/dt = ry - xz + z\ndz/dt = sxy - ez`,
    step(x, y, z, params, dt) {
      const dx = y - params.p*x + params.q*y*z;
      const dy = params.r*y - x*z + z;
      const dz = params.s*x*y - params.e*z;
      return [x + dx*dt, y + dy*dt, z + dz*dt];
    },
    init: () => [1.1, 2.1, -2]
  },
  rossler: {
    name: 'Rossler',
    params: { a: { val: 0.2, min: 0, max: 1, step: 0.001 }, b: { val: 0.2, min: 0, max: 1, step: 0.001 }, c: { val: 5.7, min: 0, max: 20, step: 0.1 } },
    dt: 0.008,
    scale: 12,
    eq: `dx/dt = -y - z\ndy/dt = x + ay\ndz/dt = b + z(x - c)`,
    step(x, y, z, p, dt) {
      const dx = -y - z;
      const dy = x + p.a*y;
      const dz = p.b + z*(x - p.c);
      return [x + dx*dt, y + dy*dt, z + dz*dt];
    },
    init: () => [0.1, 0, 0]
  },
  sprott: {
    name: 'Sprott',
    params: { a: { val: 2.07, min: 1, max: 4, step: 0.01 }, b: { val: 1.79, min: 0, max: 3, step: 0.01 } },
    dt: 0.02,
    scale: 120,
    eq: `dx/dt = y + axy + xz\ndy/dt = 1 - bx² + yz\ndz/dt = x - x² - y²`,
    step(x, y, z, p, dt) {
      const dx = y + p.a*x*y + x*z;
      const dy = 1 - p.b*x*x + y*z;
      const dz = x - x*x - y*y;
      return [x + dx*dt, y + dy*dt, z + dz*dt];
    },
    init: () => [0.63, 0.47, -0.54]
  }
};

// ============================================================
//  COLOR PALETTES
// ============================================================
const PALETTES = [
  { name: 'Indigo Storm', colors: ['#6366f1','#818cf8','#a78bfa','#c084fc','#e879f9'] },
  { name: 'Ocean Fire',   colors: ['#06b6d4','#22d3ee','#67e8f9','#fb923c','#f97316'] },
  { name: 'Aurora',       colors: ['#10b981','#34d399','#6ee7b7','#a78bfa','#c084fc'] },
  { name: 'Solar',        colors: ['#f59e0b','#fbbf24','#fde68a','#ef4444','#dc2626'] },
  { name: 'Monochrome',   colors: ['#f8fafc','#cbd5e1','#94a3b8','#64748b','#475569'] },
  { name: 'Neon',         colors: ['#ff006e','#fb5607','#ffbe0b','#8338ec','#3a86ff'] },
];

// ============================================================
//  STATE
// ============================================================
let currentAttractor = 'lorenz';
let currentPalette = 0;
let params = {};
let trailLength = 50;
let speedMult = 1.0;
let pointSize = 1.5;
let rotating = true;
let rotAngleX = 0.5;
let rotAngleY = 0;
let rotAngleZ = 0;

// Simulation state
let points = [];
let trails = [];
const NUM_PARTICLES = 8;

// Canvas
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H;

// Mouse interaction
let isDragging = false;
let lastMouse = { x: 0, y: 0 };
let zoom = 1;

// FPS
let frameCount = 0;
let lastFpsTime = performance.now();
let fps = 0;

// ============================================================
//  INIT
// ============================================================
function resize() {
  W = canvas.width = window.innerWidth * devicePixelRatio;
  H = canvas.height = window.innerHeight * devicePixelRatio;
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = window.innerHeight + 'px';
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
}

window.addEventListener('resize', resize);
resize();

function initAttractor(name) {
  currentAttractor = name;
  const att = ATTRACTORS[name];

  // Copy params
  params = {};
  for (const k in att.params) {
    params[k] = att.params[k].val;
  }

  // Init particles with slight offsets
  points = [];
  trails = [];
  for (let i = 0; i < NUM_PARTICLES; i++) {
    const base = att.init();
    points.push([
      base[0] + (Math.random() - 0.5) * 0.01,
      base[1] + (Math.random() - 0.5) * 0.01,
      base[2] + (Math.random() - 0.5) * 0.01
    ]);
    trails.push([]);
  }

  // Update UI
  buildParamSliders(att);
  updateEquation(att);
  updateAttractorButtons();
  document.getElementById('attractorName').textContent = att.name;
}

// ============================================================
//  UI BUILDERS
// ============================================================
function buildAttractorGrid() {
  const grid = document.getElementById('attractorGrid');
  grid.innerHTML = '';
  for (const key in ATTRACTORS) {
    const btn = document.createElement('button');
    btn.className = 'attractor-btn' + (key === currentAttractor ? ' active' : '');
    btn.textContent = ATTRACTORS[key].name;
    btn.dataset.key = key;
    btn.onclick = () => { clearCanvas(); initAttractor(key); };
    grid.appendChild(btn);
  }
}

function updateAttractorButtons() {
  document.querySelectorAll('.attractor-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.key === currentAttractor);
  });
}

function buildParamSliders(att) {
  const container = document.getElementById('paramSliders');
  container.innerHTML = '';
  for (const key in att.params) {
    const p = att.params[key];
    const group = document.createElement('div');
    group.className = 'param-group';
    group.innerHTML = `
      <div class="param-label">
        <div class="param-name">${key}</div>
        <div class="param-value" id="pv_${key}">${params[key].toFixed(3)}</div>
      </div>
      <input type="range" min="${p.min}" max="${p.max}" step="${p.step}" value="${params[key]}" id="ps_${key}">
    `;
    container.appendChild(group);

    const slider = document.getElementById(`ps_${key}`);
    slider.addEventListener('input', () => {
      params[key] = parseFloat(slider.value);
      document.getElementById(`pv_${key}`).textContent = params[key].toFixed(3);
    });
  }
}

function updateEquation(att) {
  document.getElementById('equation').textContent = att.eq;
}

function buildPalettes() {
  const row = document.getElementById('paletteRow');
  row.innerHTML = '';
  PALETTES.forEach((pal, i) => {
    const swatch = document.createElement('div');
    swatch.className = 'palette-swatch' + (i === currentPalette ? ' active' : '');
    swatch.style.background = `linear-gradient(135deg, ${pal.colors[0]}, ${pal.colors[2]}, ${pal.colors[4]})`;
    swatch.title = pal.name;
    swatch.onclick = () => {
      currentPalette = i;
      document.querySelectorAll('.palette-swatch').forEach(s => s.classList.remove('active'));
      swatch.classList.add('active');
    };
    row.appendChild(swatch);
  });
}

// ============================================================
//  VISUAL CONTROLS
// ============================================================
document.getElementById('trailSlider').addEventListener('input', e => {
  trailLength = parseInt(e.target.value);
  document.getElementById('trailVal').textContent = trailLength;
});

document.getElementById('speedSlider').addEventListener('input', e => {
  speedMult = parseInt(e.target.value) / 10;
  document.getElementById('speedVal').textContent = speedMult.toFixed(1);
});

document.getElementById('sizeSlider').addEventListener('input', e => {
  pointSize = parseInt(e.target.value) / 10;
  document.getElementById('sizeVal').textContent = pointSize.toFixed(1);
});

// ============================================================
//  3D PROJECTION
// ============================================================
function project(x, y, z) {
  const att = ATTRACTORS[currentAttractor];
  const s = att.scale * zoom;

  // Rotate
  let x1 = x, y1 = y, z1 = z;

  // Rotate around X
  let cosA = Math.cos(rotAngleX), sinA = Math.sin(rotAngleX);
  let y2 = y1*cosA - z1*sinA;
  let z2 = y1*sinA + z1*cosA;
  y1 = y2; z1 = z2;

  // Rotate around Y
  cosA = Math.cos(rotAngleY); sinA = Math.sin(rotAngleY);
  let x2 = x1*cosA + z1*sinA;
  z2 = -x1*sinA + z1*cosA;
  x1 = x2; z1 = z2;

  // Rotate around Z
  cosA = Math.cos(rotAngleZ); sinA = Math.sin(rotAngleZ);
  x2 = x1*cosA - y1*sinA;
  y2 = x1*sinA + y1*cosA;
  x1 = x2; y1 = y2;

  // Perspective
  const perspective = 600;
  const zOff = z1 * s;
  const fov = perspective / (perspective + zOff);

  const sx = window.innerWidth / 2 + x1 * s * fov;
  const sy = window.innerHeight / 2 + y1 * s * fov;

  return { x: sx, y: sy, depth: z1, fov };
}

// ============================================================
//  SIMULATION STEP
// ============================================================
function simulate() {
  const att = ATTRACTORS[currentAttractor];
  const stepsPerFrame = Math.max(1, Math.round(4 * speedMult));

  for (let i = 0; i < NUM_PARTICLES; i++) {
    for (let s = 0; s < stepsPerFrame; s++) {
      const [x, y, z] = points[i];
      const next = att.step(x, y, z, params, att.dt);

      // Divergence check
      if (Math.abs(next[0]) > 1e6 || Math.abs(next[1]) > 1e6 || Math.abs(next[2]) > 1e6) {
        const base = att.init();
        points[i] = [base[0] + Math.random()*0.01, base[1] + Math.random()*0.01, base[2] + Math.random()*0.01];
        trails[i] = [];
        break;
      }

      points[i] = next;
      trails[i].push([...next]);

      if (trails[i].length > trailLength) {
        trails[i].shift();
      }
    }
  }
}

// ============================================================
//  RENDER
// ============================================================
function render() {
  const w = window.innerWidth;
  const h = window.innerHeight;

  // Fade effect for trails
  ctx.fillStyle = 'rgba(0, 0, 0, 0.08)';
  ctx.fillRect(0, 0, w, h);

  const pal = PALETTES[currentPalette].colors;

  let totalPoints = 0;

  for (let i = 0; i < NUM_PARTICLES; i++) {
    const trail = trails[i];
    if (trail.length < 2) continue;

    totalPoints += trail.length;

    const color = pal[i % pal.length];
    const r = parseInt(color.slice(1,3), 16);
    const g = parseInt(color.slice(3,5), 16);
    const b = parseInt(color.slice(5,7), 16);

    // Draw trail as gradient line
    for (let j = 1; j < trail.length; j++) {
      const alpha = (j / trail.length);
      const p1 = project(trail[j-1][0], trail[j-1][1], trail[j-1][2]);
      const p2 = project(trail[j][0], trail[j][1], trail[j][2]);

      ctx.beginPath();
      ctx.moveTo(p1.x, p1.y);
      ctx.lineTo(p2.x, p2.y);
      ctx.strokeStyle = `rgba(${r},${g},${b},${alpha * 0.7})`;
      ctx.lineWidth = pointSize * alpha * p2.fov;
      ctx.stroke();
    }

    // Draw head glow
    const head = project(trail[trail.length-1][0], trail[trail.length-1][1], trail[trail.length-1][2]);
    const glowSize = pointSize * 3 * head.fov;

    const gradient = ctx.createRadialGradient(head.x, head.y, 0, head.x, head.y, glowSize);
    gradient.addColorStop(0, `rgba(${r},${g},${b},0.9)`);
    gradient.addColorStop(0.4, `rgba(${r},${g},${b},0.3)`);
    gradient.addColorStop(1, `rgba(${r},${g},${b},0)`);

    ctx.beginPath();
    ctx.arc(head.x, head.y, glowSize, 0, Math.PI * 2);
    ctx.fillStyle = gradient;
    ctx.fill();
  }

  document.getElementById('pointCount').textContent = totalPoints.toLocaleString();
}

// ============================================================
//  ANIMATION LOOP
// ============================================================
function loop(time) {
  requestAnimationFrame(loop);

  // Auto rotation
  if (rotating) {
    rotAngleY += 0.003;
  }

  simulate();
  render();

  // FPS counter
  frameCount++;
  if (time - lastFpsTime >= 1000) {
    fps = frameCount;
    frameCount = 0;
    lastFpsTime = time;
    document.getElementById('fpsCount').textContent = fps;
  }
}

// ============================================================
//  MOUSE / TOUCH INTERACTION
// ============================================================
canvas.addEventListener('mousedown', e => {
  isDragging = true;
  lastMouse = { x: e.clientX, y: e.clientY };
});

canvas.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const dx = e.clientX - lastMouse.x;
  const dy = e.clientY - lastMouse.y;
  rotAngleY += dx * 0.005;
  rotAngleX += dy * 0.005;
  lastMouse = { x: e.clientX, y: e.clientY };
});

canvas.addEventListener('mouseup', () => isDragging = false);
canvas.addEventListener('mouseleave', () => isDragging = false);

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  zoom *= e.deltaY > 0 ? 0.95 : 1.05;
  zoom = Math.max(0.1, Math.min(10, zoom));
}, { passive: false });

// Touch support
canvas.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    isDragging = true;
    lastMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }
});

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!isDragging || e.touches.length !== 1) return;
  const dx = e.touches[0].clientX - lastMouse.x;
  const dy = e.touches[0].clientY - lastMouse.y;
  rotAngleY += dx * 0.005;
  rotAngleX += dy * 0.005;
  lastMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
}, { passive: false });

canvas.addEventListener('touchend', () => isDragging = false);

// ============================================================
//  ACTIONS
// ============================================================
function togglePanel() {
  const panel = document.getElementById('panel');
  const btn = document.getElementById('toggleBtn');
  panel.classList.toggle('collapsed');
  btn.classList.toggle('visible');
}

function resetView() {
  rotAngleX = 0.5;
  rotAngleY = 0;
  rotAngleZ = 0;
  zoom = 1;
  clearCanvas();
  initAttractor(currentAttractor);
}

function clearCanvas() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);
  for (let i = 0; i < trails.length; i++) trails[i] = [];
}

function saveImage() {
  const link = document.createElement('a');
  link.download = `attractor_${currentAttractor}_${Date.now()}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
}

function toggleRotation() {
  rotating = !rotating;
}

// ============================================================
//  KEYBOARD SHORTCUTS
// ============================================================
document.addEventListener('keydown', e => {
  if (e.key === 'h' || e.key === 'H') togglePanel();
  if (e.key === 'r' || e.key === 'R') resetView();
  if (e.key === 'c' || e.key === 'C') clearCanvas();
  if (e.key === 's' || e.key === 'S') saveImage();
  if (e.key === ' ') { e.preventDefault(); toggleRotation(); }

  // Number keys to switch attractors
  const keys = Object.keys(ATTRACTORS);
  const num = parseInt(e.key);
  if (num >= 1 && num <= keys.length) {
    clearCanvas();
    initAttractor(keys[num - 1]);
  }
});

// ============================================================
//  START
// ============================================================
buildAttractorGrid();
buildPalettes();
initAttractor('lorenz');
clearCanvas();
requestAnimationFrame(loop);
</script>
</body>
</html>
