<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fractal — The Mandelbrot Set</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Inter:wght@300;400&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#060608;color:#fff;font-family:'Inter',sans-serif;overflow:hidden;height:100vh;width:100vw}
  #c{position:absolute;top:0;left:0;width:100vw;height:100vh;image-rendering:pixelated;cursor:crosshair}

  #intro{position:fixed;inset:0;z-index:100;background:#060608;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;transition:opacity 1s}
  #intro.hide{opacity:0;pointer-events:none}
  #intro h1{font-family:'Cormorant Garamond',serif;font-size:clamp(42px,7vw,72px);font-weight:300;letter-spacing:10px;text-transform:lowercase;color:rgba(255,255,255,.8);margin-bottom:12px}
  .sub{font-size:13px;font-weight:300;color:rgba(255,255,255,.15);letter-spacing:3px;max-width:420px;line-height:1.8;margin-bottom:6px}
  .sub2{font-size:11px;font-weight:300;color:rgba(255,255,255,.06);letter-spacing:2px;max-width:380px;line-height:1.7;margin-bottom:28px;font-style:italic;font-family:'Cormorant Garamond',serif}
  #intro button{background:none;border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.5);font-family:'Cormorant Garamond',serif;font-size:18px;letter-spacing:6px;padding:14px 48px;border-radius:60px;cursor:pointer;transition:all .4s}
  #intro button:hover{border-color:rgba(255,255,255,.3);color:rgba(255,255,255,.8);box-shadow:0 0 40px rgba(255,255,255,.05)}

  .hud{position:fixed;z-index:10;display:none}
  #topL{top:20px;left:20px}
  .htitle{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;color:rgba(255,255,255,.08);letter-spacing:6px}
  .hmode{font-size:10px;color:rgba(255,200,100,.25);letter-spacing:2px;margin-top:2px}
  .hcoord{font-size:8px;color:rgba(255,255,255,.06);letter-spacing:1px;margin-top:4px;font-family:monospace;font-variant-numeric:tabular-nums}
  .hhint{font-size:9px;color:rgba(255,255,255,.05);letter-spacing:2px;margin-top:2px}

  #topR{top:20px;right:20px;display:none;flex-direction:column;gap:6px;align-items:flex-end}
  .cr{display:flex;align-items:center;gap:8px}
  .cl{font-size:9px;color:rgba(255,255,255,.12);letter-spacing:2px;text-transform:uppercase;min-width:40px;text-align:right}
  .cs{-webkit-appearance:none;appearance:none;width:110px;height:2px;background:rgba(255,255,255,.06);border-radius:2px;outline:none}
  .cs::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:rgba(255,255,255,.25);cursor:pointer}
  .cv{font-size:8px;color:rgba(255,255,255,.1);min-width:30px;font-variant-numeric:tabular-nums}
  .cb{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);color:rgba(255,255,255,.25);font-size:9px;letter-spacing:2px;padding:6px 14px;border-radius:16px;cursor:pointer;transition:all .3s;text-transform:uppercase;font-family:'Inter',sans-serif}
  .cb:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.45)}
  .cb.on{border-color:rgba(255,200,100,.25);color:rgba(255,200,100,.5);background:rgba(255,200,100,.04)}

  #bot{bottom:20px;left:50%;transform:translateX(-50%);display:none;flex-direction:column;align-items:center;gap:8px}
  .brow{display:flex;gap:6px;flex-wrap:wrap;justify-content:center}
  .bb{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);color:rgba(255,255,255,.2);font-size:10px;letter-spacing:2px;padding:7px 14px;border-radius:20px;cursor:pointer;transition:all .3s;text-transform:lowercase;font-family:'Inter',sans-serif}
  .bb:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.4)}
  .bb.on{border-color:rgba(255,200,100,.25);color:rgba(255,200,100,.5);background:rgba(255,200,100,.04)}

  #zbar{right:20px;top:50%;transform:translateY(-50%);display:none;flex-direction:column;align-items:center;gap:6px}
  .zb{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);color:rgba(255,255,255,.25);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s;font-family:'Inter',sans-serif}
  .zb:hover{background:rgba(255,255,255,.08);color:rgba(255,255,255,.5)}
  .zlv{font-size:7px;color:rgba(255,255,255,.06);writing-mode:vertical-rl;letter-spacing:1px;margin:4px 0;font-family:monospace}

  #jprev{bottom:80px;right:20px;display:none;border:1px solid rgba(255,255,255,.06);border-radius:10px;overflow:hidden;cursor:pointer;width:180px;height:135px;transition:border-color .3s}
  #jprev:hover{border-color:rgba(255,255,255,.2)}
  #jprev canvas{width:100%;height:100%;display:block}
</style>
</head>
<body>

<div id="intro">
  <h1>fractal</h1>
  <div class="sub">z = z² + c<br>One equation. Infinite complexity.<br>Click to zoom. It never ends.</div>
  <div class="sub2">"Bottomless wonders spring from simple rules repeated without end." — Benoit Mandelbrot</div>
  <button onclick="start()">enter</button>
</div>

<canvas id="c"></canvas>

<div class="hud" id="topL">
  <div class="htitle">fractal</div>
  <div class="hmode" id="modeL"></div>
  <div class="hcoord" id="coordL"></div>
  <div class="hhint">click zoom · right-click out · drag pan · scroll zoom</div>
</div>

<div class="hud" id="topR">
  <div class="cr">
    <span class="cl">iters</span>
    <input class="cs" type="range" min="50" max="4000" value="200" id="iterS">
    <span class="cv" id="iterV">200</span>
  </div>
  <div class="cr" style="gap:6px;flex-wrap:wrap;justify-content:flex-end">
    <button class="cb" onclick="resetView()">reset</button>
    <button class="cb" id="jBtn" onclick="toggleJulia()">julia</button>
    <button class="cb" onclick="saveImage()">save</button>
    <button class="cb" id="hdBtn" onclick="toggleHD()">hd</button>
  </div>
</div>

<div class="hud" id="zbar">
  <button class="zb" onclick="doZoom(3)">+</button>
  <div class="zlv" id="zlv">1x</div>
  <button class="zb" onclick="doZoom(1/3)">−</button>
</div>

<div class="hud" id="bot">
  <div class="brow" id="palR"></div>
  <div class="brow" id="poiR"></div>
</div>

<div class="hud" id="jprev">
  <canvas id="jc" width="360" height="270"></canvas>
</div>

<script>
const C = document.getElementById('c');
const X = C.getContext('2d');
const JC = document.getElementById('jc');
const JX = JC.getContext('2d');

// === STATE ===
let W, H;                       // canvas pixel dimensions
let cx = -0.5, cy = 0;          // complex center
let zm = 1;                     // zoom (pixels per unit)
let bz;                         // base zoom (fits set in viewport)
let maxIt = 200;
let hd = false;
let jMode = false;              // full Julia mode
let jCr = -0.7269, jCi = 0.1889;
let needsRender = true;
let started = false;

// interaction
let mDown = false, mBtn = 0, dragged = false;
let dsx, dsy, dcx, dcy;

// animation
let anim = false, asx, asy, asz, atx, aty, atz, at0;
const AD = 500;

// throttle
let jPrevTimer = 0;

// === PALETTES ===
const PAL = {
  electric: t => [~~(9*(1-t)*t*t*t*255), ~~(15*(1-t)*(1-t)*t*t*255), ~~(8.5*(1-t)*(1-t)*(1-t)*t*255)],
  fire: t => [Math.min(255,~~(t<.5?t*510:255)), Math.min(255,~~(t<.5?0:(t-.5)*400)), Math.min(255,~~(t>.8?(t-.8)*1000:0))],
  ocean: t => [~~(t*60), ~~(40+t*160), ~~(80+t*175)],
  mono: t => { const v=~~(t*255); return [v,v,v]; },
  psyche: t => [~~(Math.sin(t*6.283)*127+128), ~~(Math.sin(t*6.283+2.094)*127+128), ~~(Math.sin(t*6.283+4.189)*127+128)],
  twilight: t => [~~(20+t*180), ~~(10+Math.sin(t*3.14)*80), ~~(60+Math.cos(t*1.57)*195)],
  emerald: t => [~~(t*80), ~~(60+t*195), ~~(30+t*100)],
  ice: t => [~~(180+t*75), ~~(200+t*55), ~~(220+t*35)],
  plasma: t => [~~(Math.sin(t*3.14)*200+55), ~~(Math.sin(t*3.14+1)*100+30), ~~(Math.cos(t*2)*180+75)],
  nebula: t => [~~(40+t*120), ~~(10+t*t*80), ~~(80+t*175)]
};
let curPal = 'electric';

// LUT: 2048 entries for silky smooth gradients
const LUT = new Uint8Array(2048*3);
function buildLUT(){
  const fn = PAL[curPal];
  for(let i=0;i<2048;i++){
    const [r,g,b] = fn(i/2048);
    LUT[i*3]=r; LUT[i*3+1]=g; LUT[i*3+2]=b;
  }
}
buildLUT();

// === POI ===
const POI = [
  {n:'full set',x:-0.5,y:0,z:1},
  {n:'seahorse',x:-0.7463,y:0.1102,z:200},
  {n:'elephant',x:0.2821,y:0.01,z:150},
  {n:'spiral',x:-0.7746806,y:0.1374168,z:5000},
  {n:'lightning',x:-0.170337,y:1.06506,z:800},
  {n:'mini brot',x:-1.7685,y:0.0018,z:2000},
  {n:'double spiral',x:0.37001085,y:-0.6714354,z:15000},
  {n:'jewel',x:-0.235125,y:0.827215,z:4000},
  {n:'tendrils',x:-0.1011,y:0.9563,z:3000},
  {n:'antenna',x:-1.25066,y:0.02012,z:1200},
];

const JPRE = [
  {n:'dendrite',r:-0.7269,i:0.1889},
  {n:'galaxy',r:-0.8,i:0.156},
  {n:'dragon',r:-0.4,i:0.6},
  {n:'frost',r:0.355,i:0.355},
  {n:'rabbit',r:-0.123,i:0.745},
  {n:'star',r:-0.75,i:0},
  {n:'vortex',r:0.285,i:0.01},
  {n:'web',r:-0.038,i:0.9754},
];

// === RESIZE ===
function resize(){
  const s = hd ? 1 : 2;
  W = Math.ceil(innerWidth/s);
  H = Math.ceil(innerHeight/s);
  C.width = W; C.height = H;
  bz = Math.min(W,H)/3;
  if(!started) zm = bz;
  needsRender = true;
}

// === RENDER ===
function render(){
  const img = X.createImageData(W,H);
  const d = img.data;
  const sc = 1/zm;
  const hw = W/2, hh = H/2;
  const isJ = jMode;
  const jcr = jCr, jci = jCi;
  const mi = maxIt;

  for(let py=0; py<H; py++){
    const ci_base = cy + (py - hh)*sc;
    for(let px=0; px<W; px++){
      const cr_base = cx + (px - hw)*sc;

      let zr, zi, ccr, cci;
      if(isJ){
        zr = cr_base; zi = ci_base;
        ccr = jcr; cci = jci;
      } else {
        zr = 0; zi = 0;
        ccr = cr_base; cci = ci_base;
      }

      // Cardioid + bulb skip (Mandelbrot only)
      if(!isJ){
        const dx = ccr - 0.25;
        const cy2 = cci*cci;
        const q = dx*dx + cy2;
        if(q*(q+dx) <= 0.25*cy2){ // main cardioid
          const idx = (py*W+px)*4;
          d[idx]=0;d[idx+1]=0;d[idx+2]=0;d[idx+3]=255;
          continue;
        }
        const dx2 = ccr+1;
        if(dx2*dx2+cy2 <= 0.0625){ // period-2 bulb
          const idx = (py*W+px)*4;
          d[idx]=0;d[idx+1]=0;d[idx+2]=0;d[idx+3]=255;
          continue;
        }
      }

      let zr2 = zr*zr, zi2 = zi*zi;
      let i = 0;
      for(; i<mi && zr2+zi2<4; i++){
        zi = 2*zr*zi + cci;
        zr = zr2 - zi2 + ccr;
        zr2 = zr*zr;
        zi2 = zi*zi;
      }

      const idx = (py*W+px)*4;
      if(i===mi){
        d[idx]=0;d[idx+1]=0;d[idx+2]=0;d[idx+3]=255;
      } else {
        const smooth = i + 1 - Math.log2(Math.log2(zr2+zi2)*0.5);
        const t = (((smooth%60)/60)*2048)|0;
        const li = ((t+2048)%2048)*3;
        d[idx]=LUT[li]; d[idx+1]=LUT[li+1]; d[idx+2]=LUT[li+2]; d[idx+3]=255;
      }
    }
  }

  X.putImageData(img,0,0);
  needsRender = false;
  updateInfo();
}

// === JULIA PREVIEW ===
function renderJulia(cr,ci){
  const jw=JC.width, jh=JC.height;
  const img=JX.createImageData(jw,jh);
  const d=img.data;
  const sc=3/Math.min(jw,jh);
  const hw=jw/2, hh=jh/2;

  for(let py=0;py<jh;py++){
    for(let px=0;px<jw;px++){
      let zr=(px-hw)*sc, zi=(py-hh)*sc;
      let i=0;
      for(;i<100&&zr*zr+zi*zi<4;i++){
        const t=zr*zr-zi*zi+cr;
        zi=2*zr*zi+ci;
        zr=t;
      }
      const idx=(py*jw+px)*4;
      if(i===100){
        d[idx]=0;d[idx+1]=0;d[idx+2]=0;d[idx+3]=255;
      } else {
        const s=i+1-Math.log2(Math.log2(zr*zr+zi*zi)*0.5);
        const t=(((s%30)/30)*2048)|0;
        const li=((t+2048)%2048)*3;
        d[idx]=LUT[li];d[idx+1]=LUT[li+1];d[idx+2]=LUT[li+2];d[idx+3]=255;
      }
    }
  }
  JX.putImageData(img,0,0);
}

// === SCREEN → COMPLEX ===
function s2c(sx,sy){
  const sc=1/zm;
  return {
    r: cx + (sx/innerWidth*W - W/2)*sc,
    i: cy + (sy/innerHeight*H - H/2)*sc
  };
}

// === INFO ===
function updateInfo(){
  const zl = zm/bz;
  let zs;
  if(zl>=1e9) zs=zl.toExponential(1)+'x';
  else if(zl>=1e6) zs=(zl/1e6).toFixed(1)+'Mx';
  else if(zl>=1e3) zs=(zl/1e3).toFixed(1)+'Kx';
  else zs=zl.toFixed(1)+'x';

  const sign = cy>=0?'+':'−';
  document.getElementById('coordL').textContent =
    `${cx.toPrecision(10)} ${sign} ${Math.abs(cy).toPrecision(10)}i · ${zs} · ${maxIt} iter`;
  document.getElementById('zlv').textContent = zs;

  if(jMode){
    document.getElementById('modeL').textContent =
      `julia · c = ${jCr.toFixed(4)} ${jCi>=0?'+':'−'} ${Math.abs(jCi).toFixed(4)}i`;
  }
}

// === AUTO ITERATIONS ===
function autoIter(){
  const d = zm/bz;
  let t=200;
  if(d>50)t=400; if(d>500)t=600; if(d>5e3)t=1000;
  if(d>5e4)t=1500; if(d>5e5)t=2500; if(d>5e6)t=4000;
  if(t>maxIt){ maxIt=t; document.getElementById('iterS').value=t; document.getElementById('iterV').textContent=t; }
}

// === ANIMATION ===
function animTo(tx,ty,tz){
  asx=cx; asy=cy; asz=zm;
  atx=tx; aty=ty; atz=tz;
  at0=performance.now();
  anim=true;
}

function tickAnim(now){
  if(!anim) return;
  let t=(now-at0)/AD;
  if(t>=1){t=1;anim=false;}
  const e = t<.5 ? 2*t*t : 1-Math.pow(-2*t+2,2)/2;
  cx = asx+(atx-asx)*e;
  cy = asy+(aty-asy)*e;
  zm = Math.exp(Math.log(asz)+(Math.log(atz)-Math.log(asz))*e);
  autoIter();
  needsRender = true;
}

// === MOUSE ===
C.addEventListener('mousedown', e=>{
  mDown=true; mBtn=e.button; dragged=false;
  dsx=e.clientX; dsy=e.clientY; dcx=cx; dcy=cy;
});

C.addEventListener('mousemove', e=>{
  if(mDown && mBtn===0){
    const dx=e.clientX-dsx, dy=e.clientY-dsy;
    if(Math.abs(dx)>3||Math.abs(dy)>3) dragged=true;
    const ps = innerWidth/W;
    cx = dcx - dx/ps/zm;
    cy = dcy - dy/ps/zm;
    needsRender = true;
  }
  // Julia preview (throttled)
  if(!jMode && started){
    const now=performance.now();
    if(now-jPrevTimer>80){
      jPrevTimer=now;
      const c=s2c(e.clientX,e.clientY);
      jCr=c.r; jCi=c.i;
      renderJulia(c.r,c.i);
    }
  }
});

C.addEventListener('mouseup', e=>{
  if(mBtn===0 && !dragged){
    const c=s2c(e.clientX,e.clientY);
    animTo(c.r,c.i,zm*3);
  }
  mDown=false;
});

C.addEventListener('contextmenu', e=>{
  e.preventDefault();
  const c=s2c(e.clientX,e.clientY);
  const nz=Math.max(bz*.5,zm/3);
  animTo(cx+(c.r-cx)*.3, cy+(c.i-cy)*.3, nz);
});

addEventListener('wheel', e=>{
  e.preventDefault();
  const f=e.deltaY>0?0.8:1.25;
  const c=s2c(e.clientX,e.clientY);
  const nz=zm*f;
  cx=c.r-(c.r-cx)*zm/nz;
  cy=c.i-(c.i-cy)*zm/nz;
  zm=nz;
  autoIter();
  needsRender=true;
},{passive:false});

// === TOUCH ===
let tDist=0;
C.addEventListener('touchstart', e=>{
  e.preventDefault();
  if(e.touches.length===2){
    const a=e.touches[0],b=e.touches[1];
    tDist=Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY);
    dcx=cx; dcy=cy;
  } else {
    mDown=true; mBtn=0; dragged=false;
    dsx=e.touches[0].clientX; dsy=e.touches[0].clientY;
    dcx=cx; dcy=cy;
  }
},{passive:false});

C.addEventListener('touchmove', e=>{
  e.preventDefault();
  if(e.touches.length===2){
    const a=e.touches[0],b=e.touches[1];
    const d=Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY);
    if(tDist>0){zm*=d/tDist; autoIter(); needsRender=true;}
    tDist=d;
  } else if(mDown){
    const dx=e.touches[0].clientX-dsx, dy=e.touches[0].clientY-dsy;
    if(Math.abs(dx)>3||Math.abs(dy)>3) dragged=true;
    const ps=innerWidth/W;
    cx=dcx-dx/ps/zm; cy=dcy-dy/ps/zm;
    needsRender=true;
  }
},{passive:false});

C.addEventListener('touchend', e=>{
  if(e.changedTouches.length===1&&!e.touches.length&&!dragged){
    const t=e.changedTouches[0];
    const c=s2c(t.clientX,t.clientY);
    animTo(c.r,c.i,zm*2.5);
  }
  mDown=false; tDist=0;
});

// === KEYBOARD ===
addEventListener('keydown', e=>{
  if(!started)return;
  const k=e.key;
  if(k==='r') resetView();
  else if(k==='j') toggleJulia();
  else if(k==='s') saveImage();
  else if(k==='h') toggleHD();
  else if(k==='='||k==='+'){maxIt=Math.min(4000,maxIt+100);document.getElementById('iterS').value=maxIt;document.getElementById('iterV').textContent=maxIt;needsRender=true;}
  else if(k==='-'){maxIt=Math.max(50,maxIt-100);document.getElementById('iterS').value=maxIt;document.getElementById('iterV').textContent=maxIt;needsRender=true;}
  else if(k==='ArrowUp'){e.preventDefault();zm*=1.5;autoIter();needsRender=true;}
  else if(k==='ArrowDown'){e.preventDefault();zm=Math.max(bz*.5,zm/1.5);needsRender=true;}
  else if(k==='ArrowLeft'){e.preventDefault();cx-=.1/zm*bz;needsRender=true;}
  else if(k==='ArrowRight'){e.preventDefault();cx+=.1/zm*bz;needsRender=true;}
  else if(k>='1'&&k<='9'){
    const keys=Object.keys(PAL);
    const i=parseInt(k)-1;
    if(i<keys.length){curPal=keys[i];buildLUT();needsRender=true;buildPalUI();}
  }
});

// === CONTROLS ===
document.getElementById('iterS').addEventListener('input', e=>{
  maxIt=parseInt(e.target.value);
  document.getElementById('iterV').textContent=maxIt;
  needsRender=true;
});

function resetView(){
  animTo(jMode?0:-0.5, 0, bz);
  maxIt=200; document.getElementById('iterS').value=200; document.getElementById('iterV').textContent='200';
}

function toggleJulia(){
  jMode=!jMode;
  document.getElementById('jBtn').classList.toggle('on',jMode);
  document.getElementById('modeL').style.display=jMode?'block':'none';
  document.getElementById('jprev').style.display=jMode?'none':'block';

  if(jMode){
    cx=0; cy=0; zm=bz;
    buildJuliaUI();
  } else {
    cx=-0.5; cy=0; zm=bz;
    buildPOIui();
  }
  needsRender=true;
}

function toggleHD(){
  hd=!hd;
  document.getElementById('hdBtn').classList.toggle('on',hd);
  resize();
}

function doZoom(f){
  animTo(cx,cy,Math.max(bz*.5,zm*f));
}

function saveImage(){
  // Render at current resolution to a temp canvas for clean save
  const a=document.createElement('a');
  a.download=(jMode?'julia':'mandelbrot')+'_'+Date.now()+'.png';
  a.href=C.toDataURL('image/png');
  a.click();
}

// === BUILD UI ===
function buildPalUI(){
  const r=document.getElementById('palR');
  r.innerHTML='';
  Object.keys(PAL).forEach(k=>{
    const b=document.createElement('div');
    b.className='bb'+(k===curPal?' on':'');
    b.textContent=k;
    b.onclick=()=>{
      curPal=k; buildLUT(); needsRender=true;
      r.querySelectorAll('.bb').forEach(x=>x.classList.remove('on'));
      b.classList.add('on');
      if(!jMode) renderJulia(jCr,jCi);
    };
    r.appendChild(b);
  });
}

function buildPOIui(){
  const r=document.getElementById('poiR');
  r.innerHTML='';
  POI.forEach(p=>{
    const b=document.createElement('div');
    b.className='bb';
    b.textContent=p.n;
    b.onclick=()=>{
      animTo(p.x,p.y,bz*p.z);
      if(p.z>500)autoIter();
    };
    r.appendChild(b);
  });
}

function buildJuliaUI(){
  const r=document.getElementById('poiR');
  r.innerHTML='';
  JPRE.forEach(p=>{
    const b=document.createElement('div');
    b.className='bb';
    b.textContent=p.n;
    b.onclick=()=>{
      jCr=p.r; jCi=p.i;
      cx=0; cy=0; zm=bz;
      needsRender=true;
      updateInfo();
    };
    r.appendChild(b);
  });
}

// Julia preview click → enter Julia mode
document.getElementById('jprev').addEventListener('click',()=>{
  if(!jMode) toggleJulia();
});

buildPalUI();
buildPOIui();

// === MAIN LOOP ===
function tick(now){
  tickAnim(now);
  if(needsRender) render();
  requestAnimationFrame(tick);
}

function start(){
  started=true;
  document.getElementById('intro').classList.add('hide');
  setTimeout(()=>{document.getElementById('intro').style.display='none';},1000);
  document.getElementById('topL').style.display='block';
  document.getElementById('topR').style.display='flex';
  document.getElementById('bot').style.display='flex';
  document.getElementById('zbar').style.display='flex';
  document.getElementById('jprev').style.display='block';
  zm=bz;
  needsRender=true;
  renderJulia(jCr,jCi);
}

addEventListener('resize',resize);
resize();
requestAnimationFrame(tick);
</script>
</body>
</html>
