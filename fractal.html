<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fractal — The Mandelbrot Set</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Inter:wght@300;400&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#060608;color:#fff;font-family:'Inter',sans-serif;overflow:hidden;height:100vh;width:100vw}
  #canvas{display:block;position:absolute;top:0;left:0;width:100vw;height:100vh;image-rendering:auto;cursor:crosshair}

  #intro{position:fixed;inset:0;z-index:100;background:#060608;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;transition:opacity 1.2s}
  #intro.hide{opacity:0;pointer-events:none}
  #intro h1{font-family:'Cormorant Garamond',serif;font-size:clamp(42px,7vw,72px);font-weight:300;letter-spacing:10px;text-transform:lowercase;color:rgba(255,255,255,.8);margin-bottom:12px}
  #intro .sub{font-size:13px;font-weight:300;color:rgba(255,255,255,.15);letter-spacing:3px;max-width:420px;line-height:1.8;margin-bottom:6px}
  #intro .sub2{font-size:11px;font-weight:300;color:rgba(255,255,255,.06);letter-spacing:2px;max-width:380px;line-height:1.7;margin-bottom:28px;font-style:italic;font-family:'Cormorant Garamond',serif}
  #intro button{background:none;border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.5);font-family:'Cormorant Garamond',serif;font-size:18px;letter-spacing:6px;padding:14px 48px;border-radius:60px;cursor:pointer;transition:all .4s}
  #intro button:hover{border-color:rgba(255,255,255,.3);color:rgba(255,255,255,.8);box-shadow:0 0 40px rgba(255,255,255,.05)}

  .info{position:fixed;top:20px;left:20px;z-index:10;display:none}
  .info-title{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;color:rgba(255,255,255,.08);letter-spacing:6px}
  .info-coords{font-size:8px;color:rgba(255,255,255,.06);letter-spacing:1px;margin-top:4px;font-variant-numeric:tabular-nums;font-family:monospace}
  .info-hint{font-size:9px;color:rgba(255,255,255,.05);letter-spacing:2px;margin-top:2px}

  #controls{position:fixed;top:20px;right:20px;z-index:10;display:none;flex-direction:column;gap:5px;align-items:flex-end}
  .ctrl-row{display:flex;align-items:center;gap:8px}
  .ctrl-label{font-size:9px;color:rgba(255,255,255,.12);letter-spacing:2px;text-transform:uppercase;min-width:50px;text-align:right}
  .ctrl-slider{-webkit-appearance:none;appearance:none;width:80px;height:2px;background:rgba(255,255,255,.06);border-radius:2px;outline:none}
  .ctrl-slider::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.2);cursor:pointer}
  .ctrl-val{font-size:8px;color:rgba(255,255,255,.08);min-width:30px;font-variant-numeric:tabular-nums}
  .ctrl-btn{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);color:rgba(255,255,255,.2);font-size:9px;letter-spacing:2px;padding:5px 12px;border-radius:14px;cursor:pointer;transition:all .3s;text-transform:uppercase}
  .ctrl-btn:hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.4)}

  .bottom-bar{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:10;display:none;flex-direction:column;align-items:center;gap:8px}
  .bar-row{display:flex;gap:6px}
  .bar-btn{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);color:rgba(255,255,255,.2);font-size:10px;letter-spacing:2px;padding:7px 14px;border-radius:20px;cursor:pointer;transition:all .3s;text-transform:lowercase}
  .bar-btn:hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.4)}
  .bar-btn.active{border-color:rgba(255,200,100,.2);color:rgba(255,200,100,.4);background:rgba(255,200,100,.03)}

  #julia{position:fixed;bottom:20px;right:20px;z-index:10;display:none;border:1px solid rgba(255,255,255,.06);border-radius:12px;overflow:hidden;cursor:pointer}
  #julia:hover{border-color:rgba(255,255,255,.15)}
</style>
</head>
<body>

<div id="intro">
  <h1>fractal</h1>
  <div class="sub">
    z = z² + c<br>
    One equation. Infinite complexity.<br>
    Click to zoom. It never ends.
  </div>
  <div class="sub2">"Bottomless wonders spring from simple rules repeated without end." — Benoit Mandelbrot</div>
  <button onclick="start()">enter</button>
</div>

<canvas id="canvas"></canvas>
<canvas id="julia" width="180" height="135"></canvas>

<div class="info" id="info">
  <div class="info-title">fractal</div>
  <div class="info-coords" id="coords">center: -0.5 + 0i · zoom: 1x</div>
  <div class="info-hint">click to zoom in · right-click to zoom out · drag to pan</div>
</div>

<div id="controls">
  <div class="ctrl-row">
    <span class="ctrl-label">iters</span>
    <input class="ctrl-slider" type="range" min="50" max="2000" value="200" id="iterSlider">
    <span class="ctrl-val" id="iterVal">200</span>
  </div>
  <div class="ctrl-row" style="margin-top:4px;gap:6px">
    <button class="ctrl-btn" onclick="resetView()">reset</button>
    <button class="ctrl-btn" onclick="toggleJulia()">julia</button>
  </div>
</div>

<div class="bottom-bar" id="bottomBar">
  <div class="bar-row" id="paletteRow"></div>
  <div class="bar-row" id="poiRow"></div>
</div>

<script>
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
const juliaCanvas=document.getElementById('julia');
const jctx=juliaCanvas.getContext('2d');

let GW,GH;
let maxIter=200;
let showJulia=true;

// View
let centerX=-0.5,centerY=0;
let zoom=1; // pixels per unit in complex plane
let baseZoom; // initial zoom to fit set

// Rendering
let imgData;
let needsRender=true;
let rendering=false;

// Mouse
let mouseDown=false,mouseBtn=0;
let dragStartX,dragStartY,dragCX,dragCY;
let mx=0,my=0;

// Animation
let animating=false;
let animTargetX,animTargetY,animTargetZoom;
let animStartX,animStartY,animStartZoom;
let animT=0;

// Color palettes
const PALETTES={
  'electric':{
    name:'electric',
    fn:(t)=>{
      const r=Math.floor(9*(1-t)*t*t*t*255);
      const g=Math.floor(15*(1-t)*(1-t)*t*t*255);
      const b=Math.floor(8.5*(1-t)*(1-t)*(1-t)*t*255);
      return[r,g,b];
    }
  },
  'fire':{
    name:'fire',
    fn:(t)=>{
      const r=Math.min(255,Math.floor(t<.5?t*2*255:255));
      const g=Math.min(255,Math.floor(t<.5?0:((t-.5)*2)*200));
      const b=Math.min(255,Math.floor(t>.8?(t-.8)*5*200:0));
      return[r,g,b];
    }
  },
  'ocean':{
    name:'ocean',
    fn:(t)=>{
      const r=Math.floor(t*60);
      const g=Math.floor(40+t*160);
      const b=Math.floor(80+t*175);
      return[r,g,b];
    }
  },
  'monochrome':{
    name:'mono',
    fn:(t)=>{
      const v=Math.floor(t*255);
      return[v,v,v];
    }
  },
  'psychedelic':{
    name:'psyche',
    fn:(t)=>{
      const r=Math.floor(Math.sin(t*Math.PI*2)*127+128);
      const g=Math.floor(Math.sin(t*Math.PI*2+2.094)*127+128);
      const b=Math.floor(Math.sin(t*Math.PI*2+4.189)*127+128);
      return[r,g,b];
    }
  },
  'twilight':{
    name:'twilight',
    fn:(t)=>{
      const r=Math.floor(20+t*180);
      const g=Math.floor(10+Math.sin(t*Math.PI)*80);
      const b=Math.floor(60+Math.cos(t*Math.PI*.5)*195);
      return[r,g,b];
    }
  },
  'emerald':{
    name:'emerald',
    fn:(t)=>{
      const r=Math.floor(t*80);
      const g=Math.floor(60+t*195);
      const b=Math.floor(30+t*100);
      return[r,g,b];
    }
  },
  'ice':{
    name:'ice',
    fn:(t)=>{
      const r=Math.floor(180+t*75);
      const g=Math.floor(200+t*55);
      const b=Math.floor(220+t*35);
      return[r,g,b];
    }
  },
};
let currentPalette='electric';

// Points of interest
const POI=[
  {name:'full set',x:-0.5,y:0,z:1},
  {name:'seahorse',x:-0.7463,y:0.1102,z:200},
  {name:'elephant',x:0.2821,y:0.0100,z:150},
  {name:'spiral',x:-0.7746806,y:0.1374168,z:5000},
  {name:'lightning',x:-0.170337,-0.170337,y:1.06506,z:800},
  {name:'mini brot',x:-1.7685,y:0.0018,z:2000},
  {name:'double spiral',x:0.37001085,y:-0.6714354,z:15000},
  {name:'jewel',x:-0.235125,y:0.827215,z:4000},
];

function resize(){
  GW=Math.floor(innerWidth/2);
  GH=Math.floor(innerHeight/2);
  canvas.width=GW;
  canvas.height=GH;
  baseZoom=Math.min(GW,GH)/3;
  if(zoom===1)zoom=baseZoom;
  imgData=ctx.createImageData(GW,GH);
  needsRender=true;
}

// === MANDELBROT COMPUTATION ===
function mandelbrot(cr,ci,maxIt){
  let zr=0,zi=0,zr2=0,zi2=0;
  let i=0;
  for(;i<maxIt&&zr2+zi2<4;i++){
    zi=2*zr*zi+ci;
    zr=zr2-zi2+cr;
    zr2=zr*zr;
    zi2=zi*zi;
  }
  if(i===maxIt)return-1;
  // Smooth iteration count
  return i+1-Math.log(Math.log(Math.sqrt(zr2+zi2)))/Math.log(2);
}

function renderMandelbrot(){
  if(rendering)return;
  rendering=true;
  const data=imgData.data;
  const palette=PALETTES[currentPalette].fn;
  const w=GW,h=GH;
  const scale=1/zoom;

  for(let py=0;py<h;py++){
    for(let px=0;px<w;px++){
      const cr=centerX+(px-w/2)*scale;
      const ci=centerY+(py-h/2)*scale;

      const n=mandelbrot(cr,ci,maxIter);
      const idx=(py*w+px)*4;

      if(n<0){
        // Inside set — black
        data[idx]=0;data[idx+1]=0;data[idx+2]=0;data[idx+3]=255;
      }else{
        // Smooth coloring
        const t=(n%40)/40; // cycle colors every 40 iterations
        const[r,g,b]=palette(t);
        data[idx]=r;data[idx+1]=g;data[idx+2]=b;data[idx+3]=255;
      }
    }
  }

  ctx.putImageData(imgData,0,0);
  rendering=false;
  needsRender=false;
  updateCoords();
}

// === JULIA SET PREVIEW ===
function renderJulia(cr,ci){
  if(!showJulia)return;
  const jw=juliaCanvas.width,jh=juliaCanvas.height;
  const jData=jctx.createImageData(jw,jh);
  const data=jData.data;
  const palette=PALETTES[currentPalette].fn;
  const scale=3/Math.min(jw,jh);

  for(let py=0;py<jh;py++){
    for(let px=0;px<jw;px++){
      let zr=(px-jw/2)*scale;
      let zi=(py-jh/2)*scale;
      let i=0;
      for(;i<100&&zr*zr+zi*zi<4;i++){
        const tmp=zr*zr-zi*zi+cr;
        zi=2*zr*zi+ci;
        zr=tmp;
      }
      const idx=(py*jw+px)*4;
      if(i===100){
        data[idx]=0;data[idx+1]=0;data[idx+2]=0;data[idx+3]=255;
      }else{
        const t=(i%20)/20;
        const[r,g,b]=palette(t);
        data[idx]=r;data[idx+1]=g;data[idx+2]=b;data[idx+3]=255;
      }
    }
  }
  jctx.putImageData(jData,0,0);
}

function updateCoords(){
  const zoomLevel=(zoom/baseZoom).toExponential(2);
  const sign=centerY>=0?'+':'-';
  document.getElementById('coords').textContent=
    `center: ${centerX.toPrecision(8)} ${sign} ${Math.abs(centerY).toPrecision(8)}i · zoom: ${zoomLevel}x`;
}

// === INPUT ===
canvas.addEventListener('mousedown',e=>{
  mouseDown=true;mouseBtn=e.button;
  dragStartX=e.clientX;dragStartY=e.clientY;
  dragCX=centerX;dragCY=centerY;
});

canvas.addEventListener('mousemove',e=>{
  mx=e.clientX;my=e.clientY;
  if(mouseDown&&mouseBtn===0&&!e.shiftKey){
    // Pan
    const dx=(e.clientX-dragStartX)/2; // /2 because canvas is half res
    const dy=(e.clientY-dragStartY)/2;
    centerX=dragCX-dx/zoom;
    centerY=dragCY-dy/zoom;
    needsRender=true;
  }
  // Julia preview follows mouse
  if(showJulia){
    const scale=1/zoom;
    const cr=centerX+(e.clientX/innerWidth*GW-GW/2)*scale;
    const ci=centerY+(e.clientY/innerHeight*GH-GH/2)*scale;
    renderJulia(cr,ci);
  }
});

canvas.addEventListener('mouseup',e=>{
  if(mouseBtn===0&&Math.abs(e.clientX-dragStartX)<5&&Math.abs(e.clientY-dragStartY)<5){
    // Click — zoom in
    const scale=1/zoom;
    const clickX=centerX+(e.clientX/innerWidth*GW-GW/2)*scale;
    const clickY=centerY+(e.clientY/innerHeight*GH-GH/2)*scale;
    animateToView(clickX,clickY,zoom*3);
  }
  mouseDown=false;
});

canvas.addEventListener('contextmenu',e=>{
  e.preventDefault();
  // Right-click — zoom out
  const scale=1/zoom;
  const clickX=centerX+(e.clientX/innerWidth*GW-GW/2)*scale;
  const clickY=centerY+(e.clientY/innerHeight*GH-GH/2)*scale;
  // Zoom out toward click point
  const newZoom=zoom/3;
  const t=1-newZoom/zoom;
  animateToView(
    centerX+(clickX-centerX)*t*.3,
    centerY+(clickY-centerY)*t*.3,
    newZoom
  );
});

addEventListener('wheel',e=>{
  e.preventDefault();
  const factor=e.deltaY>0?0.8:1.25;
  const scale=1/zoom;
  const mouseComplexX=centerX+(e.clientX/innerWidth*GW-GW/2)*scale;
  const mouseComplexY=centerY+(e.clientY/innerHeight*GH-GH/2)*scale;

  const newZoom=zoom*factor;
  // Zoom toward mouse position
  centerX=mouseComplexX-(mouseComplexX-centerX)*zoom/newZoom;
  centerY=mouseComplexY-(mouseComplexY-centerY)*zoom/newZoom;
  zoom=newZoom;

  // Auto-increase iterations at deep zooms
  const depth=zoom/baseZoom;
  if(depth>100&&maxIter<500)setIter(500);
  else if(depth>10000&&maxIter<1000)setIter(1000);

  needsRender=true;
},{passive:false});

// Touch
let lastTouchDist=0,lastTouchCX,lastTouchCY;
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(e.touches.length===2){
    const t1=e.touches[0],t2=e.touches[1];
    lastTouchDist=Math.sqrt((t1.clientX-t2.clientX)**2+(t1.clientY-t2.clientY)**2);
    lastTouchCX=(t1.clientX+t2.clientX)/2;
    lastTouchCY=(t1.clientY+t2.clientY)/2;
    dragCX=centerX;dragCY=centerY;
  }else{
    mouseDown=true;mouseBtn=0;
    dragStartX=e.touches[0].clientX;dragStartY=e.touches[0].clientY;
    dragCX=centerX;dragCY=centerY;
  }
},{passive:false});

canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===2){
    const t1=e.touches[0],t2=e.touches[1];
    const dist=Math.sqrt((t1.clientX-t2.clientX)**2+(t1.clientY-t2.clientY)**2);
    const cx=(t1.clientX+t2.clientX)/2,cy=(t1.clientY+t2.clientY)/2;
    if(lastTouchDist>0){
      const factor=dist/lastTouchDist;
      zoom*=factor;
      centerX=dragCX-(cx-lastTouchCX)/2/zoom;
      centerY=dragCY-(cy-lastTouchCY)/2/zoom;
      needsRender=true;
    }
    lastTouchDist=dist;
  }else if(mouseDown){
    const dx=(e.touches[0].clientX-dragStartX)/2;
    const dy=(e.touches[0].clientY-dragStartY)/2;
    centerX=dragCX-dx/zoom;
    centerY=dragCY-dy/zoom;
    needsRender=true;
  }
},{passive:false});

canvas.addEventListener('touchend',e=>{
  mouseDown=false;lastTouchDist=0;
  if(e.changedTouches.length===1&&!e.touches.length){
    // Single tap = zoom in
    const t=e.changedTouches[0];
    const scale=1/zoom;
    const clickX=centerX+(t.clientX/innerWidth*GW-GW/2)*scale;
    const clickY=centerY+(t.clientY/innerHeight*GH-GH/2)*scale;
    animateToView(clickX,clickY,zoom*2.5);
  }
});

// === ANIMATION ===
function animateToView(tx,ty,tz){
  animStartX=centerX;animStartY=centerY;animStartZoom=zoom;
  animTargetX=tx;animTargetY=ty;animTargetZoom=tz;
  animT=0;animating=true;
}

function updateAnimation(){
  if(!animating)return;
  animT+=.04;
  if(animT>=1){animT=1;animating=false}
  // Smooth easing
  const t=animT<.5?2*animT*animT:(1-Math.pow(-2*animT+2,2)/2);
  centerX=animStartX+(animTargetX-animStartX)*t;
  centerY=animStartY+(animTargetY-animStartY)*t;
  // Logarithmic zoom interpolation
  zoom=Math.exp(Math.log(animStartZoom)+(Math.log(animTargetZoom)-Math.log(animStartZoom))*t);
  needsRender=true;
}

// === CONTROLS ===
function setIter(val){
  maxIter=val;
  document.getElementById('iterSlider').value=val;
  document.getElementById('iterVal').textContent=val;
  needsRender=true;
}

document.getElementById('iterSlider').addEventListener('input',e=>{
  maxIter=parseInt(e.target.value);
  document.getElementById('iterVal').textContent=maxIter;
  needsRender=true;
});

function resetView(){
  animateToView(-0.5,0,baseZoom);
  maxIter=200;
  document.getElementById('iterSlider').value=200;
  document.getElementById('iterVal').textContent='200';
}

function toggleJulia(){
  showJulia=!showJulia;
  juliaCanvas.style.display=showJulia?'block':'none';
}

// Build palette buttons
const palRow=document.getElementById('paletteRow');
Object.keys(PALETTES).forEach(key=>{
  const btn=document.createElement('div');
  btn.className='bar-btn'+(key===currentPalette?' active':'');
  btn.textContent=PALETTES[key].name||key;
  btn.onclick=()=>{
    currentPalette=key;needsRender=true;
    palRow.querySelectorAll('.bar-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
  };
  palRow.appendChild(btn);
});

// Build POI buttons
const poiRow=document.getElementById('poiRow');
POI.forEach(p=>{
  const btn=document.createElement('div');
  btn.className='bar-btn';
  btn.textContent=p.name;
  btn.onclick=()=>{
    animateToView(p.x,p.y,baseZoom*p.z);
    // Auto-increase iterations for deep zooms
    if(p.z>500)setIter(Math.min(2000,Math.max(maxIter,500)));
    if(p.z>5000)setIter(Math.min(2000,Math.max(maxIter,1000)));
  };
  poiRow.appendChild(btn);
});

// Keyboard
addEventListener('keydown',e=>{
  if(e.key==='r')resetView();
  if(e.key==='j')toggleJulia();
  if(e.key==='+')setIter(Math.min(2000,maxIter+100));
  if(e.key==='-')setIter(Math.max(50,maxIter-100));
});

// Julia canvas click -> swap to full Julia view
juliaCanvas.addEventListener('click',()=>{
  // TODO: could implement full Julia mode
});

// === MAIN LOOP ===
function tick(){
  updateAnimation();
  if(needsRender){
    renderMandelbrot();
  }
  requestAnimationFrame(tick);
}

function start(){
  document.getElementById('intro').classList.add('hide');
  document.getElementById('info').style.display='block';
  document.getElementById('controls').style.display='flex';
  document.getElementById('bottomBar').style.display='flex';
  juliaCanvas.style.display='block';
  zoom=baseZoom;
  needsRender=true;
}

addEventListener('resize',resize);
resize();
requestAnimationFrame(tick);
</script>
</body>
</html>
